name: Update Commodity Prices

on:
  schedule:
    # Runs every weekday at 22:00 UTC (6:00 PM ET / 5:00 PM CT)
    # After U.S. futures markets close for the day
    - cron: '0 22 * * 1-5'
  workflow_dispatch:  # Lets you trigger manually from the Actions tab
  push:
    paths:
      - 'fetch_prices.py'
      - '.github/workflows/update-prices.yml'

permissions:
  contents: write  # Required so the workflow can commit the updated prices.json

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run price fetcher
        run: python fetch_prices.py

      - name: Commit and push if prices changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add prices.json
          if git diff --staged --quiet; then
            echo "No price changes to commit"
          else
            git commit -m "Auto-update commodity prices [skip ci]"
            git push
          fi
